<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=Geist+Mono:wght@400&display=swap" rel="stylesheet" />
    <style>
      /* ── xAI Design Tokens ────────────────────────────────────────── */
      :root {
        --canvas:          #0a0a0a;
        --canvas-soft:     #1a1c20;
        --canvas-card:     #191919;
        --canvas-mid:      #363a3f;
        --hairline:        #212327;
        --ink:             #ffffff;
        --body:            #dadbdf;
        --mute:            #7d8187;
        --accent-sunset:   #ff7a17;
        --accent-sunset-soft: #ffc285;
        --accent-dusk:     #7c3aed;
        --accent-twilight: #c4b5fd;
        --accent-breeze:   #a0c3ec;
        --accent-midnight: #0d1726;

        --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
        --font-mono: 'Geist Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace;

        --radius-sm:   8px;
        --radius-pill: 9999px;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body, #root {
        min-height: 100%;
        background: var(--canvas);
        color: var(--ink);
        font-family: var(--font-sans);
        font-size: 14px;
        font-weight: 400;
        line-height: 20px;
        -webkit-font-smoothing: antialiased;
      }

      /* react-grid-layout */
      .react-resizable-handle {
        opacity: 0;
        transition: opacity 0.15s;
      }
      .react-grid-item:hover .react-resizable-handle { opacity: 0.5; }
      .react-resizable-handle::after {
        border-color: var(--mute) !important;
      }

      /* scrollbar */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--canvas-mid); border-radius: 2px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
